services:
  postgres:
    image: postgres:15
    container_name: morocco_afcon_worldcup_postgres
    environment:
      POSTGRES_USER: yassine
      POSTGRES_PASSWORD: morocco2030
      POSTGRES_DB: morocco_events_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: morocco_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db

      DB_USER: yassine
      DB_PASSWORD: morocco2030
      DB_NAME: morocco_events_db
      DB_HOST: postgres
      DB_PORT: 5432

    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Yassine --lastname Megherbi --role Admin --email admin@example.com || true
      "

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: morocco_airflow_webserver
    depends_on:
      - airflow-init

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db

      DB_USER: yassine
      DB_PASSWORD: morocco2030
      DB_NAME: morocco_events_db
      DB_HOST: postgres
      DB_PORT: 5432

    ports:
      - "8080:8080"

    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: morocco_airflow_scheduler
    depends_on:
      - airflow-init

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db

      DB_USER: yassine
      DB_PASSWORD: morocco2030
      DB_NAME: morocco_events_db
      DB_HOST: postgres
      DB_PORT: 5432

    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    command: scheduler

volumes:
  postgres_data:
  airflow_data: